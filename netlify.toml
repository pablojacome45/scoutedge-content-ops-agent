import { approveDraftAction, holdDraftAction, rejectDraftAction, saveDraftAction } from "@/app/actions";
import { ContentOpsDraft, platformLabels } from "@/lib/content-types";
import { StatusBadge } from "@/components/status-badge";

interface DraftReviewCardProps {
  draft: ContentOpsDraft;
}

export function DraftReviewCard({ draft }: DraftReviewCardProps) {
  const hashtags = draft.hashtags.join(", ");

  return (
    <article className="panel platform-card">
      <div className="platform-card-header">
        <div>
          <div className="muted">Platform</div>
          <h2>{platformLabels[draft.platform]}</h2>
          <div className="muted">{draft.variantName}</div>
        </div>
        <StatusBadge status={draft.approvalStatus} />
      </div>

      <form action={saveDraftAction} className="stack">
        <input type="hidden" name="draftId" value={draft.id} />
        <input type="hidden" name="sourceId" value={draft.sourceId} />

        <div>
          <label className="label" htmlFor={`hook-${draft.id}`}>Hook</label>
          <input id={`hook-${draft.id}`} name="hook" className="field" defaultValue={draft.hook || ""} />
        </div>

        <div>
          <label className="label" htmlFor={`draft-${draft.id}`}>Draft text</label>
          <textarea
            id={`draft-${draft.id}`}
            name="draftText"
            className="field textarea review-textarea"
            defaultValue={draft.draftText}
            required
          />
        </div>

        <div className="row">
          <div>
            <label className="label" htmlFor={`cta-${draft.id}`}>CTA</label>
            <input id={`cta-${draft.id}`} name="cta" className="field" defaultValue={draft.cta || ""} />
          </div>
          <div>
            <label className="label" htmlFor={`hashtags-${draft.id}`}>Hashtags</label>
            <input id={`hashtags-${draft.id}`} name="hashtags" className="field" defaultValue={hashtags} />
          </div>
        </div>

        <button className="button secondary-button" type="submit">Save Draft</button>
      </form>

      <div className="approval-actions">
        <form action={approveDraftAction}>
          <input type="hidden" name="draftId" value={draft.id} />
          <input type="hidden" name="sourceId" value={draft.sourceId} />
          <button className="button approve-button" type="submit">Approve</button>
        </form>
        <form action={rejectDraftAction}>
          <input type="hidden" name="draftId" value={draft.id} />
          <input type="hidden" name="sourceId" value={draft.sourceId} />
          <button className="button reject-button" type="submit">Reject</button>
        </form>
        <form action={holdDraftAction}>
          <input type="hidden" name="draftId" value={draft.id} />
          <input type="hidden" name="sourceId" value={draft.sourceId} />
          <button className="button hold-button" type="submit">Hold</button>
        </form>
      </div>
    </article>
  );
}
