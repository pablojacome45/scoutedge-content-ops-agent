<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ScoutEdge Content Bot</title>
  <style>
    body{margin:0;background:#f6f3ed;color:#17211f;font-family:Arial,Helvetica,sans-serif}header{background:#142522;color:white;padding:24px;border-bottom:5px solid #0d6b61}.wrap{max-width:1100px;margin:auto;padding:22px}.grid{display:grid;grid-template-columns:380px 1fr;gap:18px}.card{background:white;border:1px solid #d9ded8;border-radius:10px;padding:18px;box-shadow:0 12px 30px rgba(0,0,0,.08)}textarea,select{width:100%;box-sizing:border-box;border:1px solid #b9c1bc;border-radius:7px;padding:10px;font:inherit;margin:6px 0 14px}textarea{min-height:150px}.checks label{display:block;margin:8px 0}.btn{border:1px solid #b9c1bc;border-radius:7px;padding:9px 12px;font-weight:700;background:white;cursor:pointer}.primary{width:100%;background:#0d6b61;color:white;border-color:#0d6b61}.draft{border:1px solid #d9ded8;border-radius:9px;background:#fbfcfb;padding:12px;margin:12px 0}.draft textarea{min-height:120px}.row{display:flex;gap:8px;flex-wrap:wrap}.muted{color:#66736f}.status{font-size:12px;font-weight:bold;background:#edf5f2;border-radius:999px;padding:4px 8px}#msg{min-height:22px;margin-top:10px;color:#66736f}@media(max-width:820px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><div class="wrap"><h1>ScoutEdge Content Bot</h1><p class="muted">Internal AI drafts. Approval-first. No auto-posting.</p></div></header>
<main class="wrap grid">
<section class="card"><h2>Generate Drafts</h2><form id="form"><label>Product update</label><textarea id="update" required></textarea><label>Audience</label><select id="audience"><option>Club coaches</option><option>Scouts and analysts</option><option>Academy directors</option><option>Football clubs</option></select><label>Tone</label><select id="tone"><option>Professional and concise</option><option>Founder-led and transparent</option><option>Community-friendly</option><option>Educational</option></select><div class="checks"><strong>Platforms</strong><label><input type="checkbox" value="x" checked> X</label><label><input type="checkbox" value="facebook" checked> Facebook</label><label><input type="checkbox" value="linkedin" checked> LinkedIn</label></div><button id="generate" class="btn primary" type="submit">Generate Drafts</button><div id="msg"></div></form><hr><h2>History</h2><button id="clear" class="btn" type="button">Clear History</button><div id="history"></div></section>
<section class="card"><div class="row"><h2 style="margin-right:auto">Draft Cards</h2><button id="exportTxt" class="btn" type="button">Export TXT</button><button id="exportJson" class="btn" type="button">Export JSON</button></div><div id="drafts" class="muted">Generate an update to see drafts.</div></section>
</main><script src="app.js"></script></body>
</html>
